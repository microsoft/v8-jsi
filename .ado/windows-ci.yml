name: v8jsi_ci_0.0.$(Date:yyMM.d)$(Rev:rrr)

# The triggers are overridden by the ADO pipeline definitions.
trigger: none
pr: none

variables:
  - name: tags
    value: production,externalfacing
    # ADO treats GitHub-sourced builds as external, so Guardian emits an
    # informational "not supported for forked repositories" warning; suppress it
    # (matches RNW; 1ES auto-suppresses it only for the SDL Sources Analysis job).
  - name: GDN_SUPPRESS_FORKED_BUILD_WARNING
    value: true

extends:
  template: windows-jobs.yml@self
  parameters:
    # CI builds must pass true.
    isPublish: true
    # It must be false for real builds. Use true only for the build pipeline debugging.
    fakeBuild: false