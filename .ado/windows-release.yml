#
# The v8-jsi Release pipeline entry point.
# It releases NuGet packages to the public ms/react-native ADO feed and to the Office feed.
#

name: v8jsi_release_0.0.$(Date:yyMM.d)$(Rev:rrr)

# The triggers are overridden by the ADO pipeline definitions.
trigger: none
pr: none

resources:
  pipelines:
  - pipeline: microsoft.v8-jsi.ci
    project: ISS
    source: microsoft.v8-jsi.ci
    trigger:
      branches:
        include:
        - master
        - main
        - '*-stable'

  repositories:
  - repository: CustomPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/OfficePipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@CustomPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      vmImage: windows-latest
      os: windows

    stages:
    - stage: publish_nugets
      displayName: Publish V8Jsi NuGets

      jobs:
      - job: ms_react_native_nuget_job
        displayName: Publish Nuget to ms/react-native-public
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - template: .ado/templates/publish-nuget-to-ado-feed.yml@self
          parameters:
            endpointId: '29e4c04c-ae69-4453-b9f3-bfef7a4c8d32'
            nugetFeedUrl: 'https://pkgs.dev.azure.com/ms/react-native/_packaging/react-native-public/nuget/v3/index.json'
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/ReactNative.V8Jsi.Windows.*.nupkg'
            publishFeedCredentials: 'Nuget - ms/react-native-public'
            feedDisplayName: 'ms/react-native-public'

      - job: office_nuget_job
        displayName: Publish Nuget to office
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - script: dir /S $(Pipeline.Workspace)\published-packages
          displayName: Show NuGet packages before cleanup

        - pwsh: |
            Add-Type -AssemblyName System.IO.Compression.FileSystem

            $feedUrl = 'https://pkgs.dev.azure.com/office/_packaging/office/nuget/v3/index.json'
            $token = "$env:SYSTEM_ACCESSTOKEN"
            $headers = @{ Authorization = "Bearer $token" }

            # Discover the flat container (PackageBaseAddress) URL from the V3 index
            $index = Invoke-RestMethod -Uri $feedUrl -Headers $headers
            $baseAddress = ($index.resources |
              Where-Object { $_.'@type' -like 'PackageBaseAddress*' } |
              Select-Object -First 1).'@id'
            if (-not $baseAddress) { throw "Could not find PackageBaseAddress in NuGet V3 index at $feedUrl" }
            if (-not $baseAddress.EndsWith('/')) { $baseAddress += '/' }
            Write-Host "PackageBaseAddress: $baseAddress"

            $nupkgs = Get-ChildItem -Path '$(Pipeline.Workspace)/published-packages' -Filter '*.nupkg' -Recurse
            $removedCount = 0

            foreach ($file in $nupkgs) {
              # Read the .nuspec from inside the nupkg (zip) to get the exact id and version
              $zip = [System.IO.Compression.ZipFile]::OpenRead($file.FullName)
              try {
                $nuspecEntry = $zip.Entries | Where-Object { $_.FullName -like '*.nuspec' } | Select-Object -First 1
                $reader = New-Object System.IO.StreamReader($nuspecEntry.Open())
                [xml]$nuspec = $reader.ReadToEnd()
                $reader.Close()
              } finally { $zip.Dispose() }

              $id = $nuspec.package.metadata.id
              $version = $nuspec.package.metadata.version

              $versionsUrl = "${baseAddress}$($id.ToLower())/index.json"
              try {
                $result = Invoke-RestMethod -Uri $versionsUrl -Headers $headers -ErrorAction Stop
                if ($version.ToLower() -in $result.versions) {
                  Write-Host "  SKIP $id $version — already on office feed"
                  Remove-Item $file.FullName
                  $removedCount++
                  continue
                }
              } catch {
                if ($_.Exception.Response.StatusCode -eq [System.Net.HttpStatusCode]::NotFound) {
                  # Package has never been published — keep it
                } else { throw }
              }
              Write-Host "  PUSH $id $version — new"
            }

            $remaining = (Get-ChildItem -Path '$(Pipeline.Workspace)/published-packages' -Filter '*.nupkg' -Recurse).Count
            Write-Host "Removed $removedCount already-published package(s). $remaining package(s) to push."
            Write-Host "##vso[task.setvariable variable=HasNewPackages]$($remaining -gt 0)"
          displayName: Remove already-published packages
          env:
            SYSTEM_ACCESSTOKEN: $(System.AccessToken)

        - script: dir /S $(Pipeline.Workspace)\published-packages
          displayName: Show NuGet packages after cleanup

        - task: 1ES.PublishNuGet@1
          displayName: NuGet push to office
          condition: and(succeeded(), eq(variables['HasNewPackages'], 'True'))
          inputs:
            useDotNetTask: true
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/ReactNative.V8Jsi.Windows.*.nupkg'
            nuGetFeedType: internal
            publishFeedCredentials: 'ES365-Office-Nuget-Package-Publisher'
            publishPackageMetadata: true
            publishVstsFeed: 'office'

      - job: publish_symbols_job
        displayName: Publish PDB Symbols to Symbol Server
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - pwsh: |
            # NuGet packages are zip archives — extract them to harvest the PDBs.
            $nugetDir   = "$(Pipeline.Workspace)/published-packages"
            $symbolsDir = "$(Pipeline.Workspace)/symbols"
            New-Item -ItemType Directory -Path $symbolsDir -Force | Out-Null

            $nupkgs = Get-ChildItem "$nugetDir/*.nupkg"
            Write-Host "Found $($nupkgs.Count) NuGet packages"

            foreach ($nupkg in $nupkgs) {
              Write-Host "Extracting PDBs from: $($nupkg.Name)"
              $extractDir = "$symbolsDir/$($nupkg.BaseName)"
              $zipPath = "$nugetDir/$($nupkg.BaseName).zip"
              Copy-Item $nupkg.FullName $zipPath
              Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
              Remove-Item $zipPath
            }

            $pdbs = Get-ChildItem "$symbolsDir" -Recurse -Filter "*.pdb"
            Write-Host "`nFound $($pdbs.Count) PDB files:"
            foreach ($pdb in $pdbs) {
              Write-Host "  $($pdb.FullName) ($([math]::Round($pdb.Length / 1MB, 2)) MB)"
            }

            if ($pdbs.Count -eq 0) {
              Write-Host "##vso[task.logissue type=warning]No PDB files found in NuGet packages"
            }
          displayName: Extract PDBs from NuGet packages

        - task: PublishSymbols@2
          displayName: Publish Symbols to Microsoft Symbol Server
          continueOnError: true
          inputs:
            UseNetCoreClientTool: true
            ConnectedServiceName: Office-V8-Jsi-Bot
            SymbolsFolder: '$(Pipeline.Workspace)/symbols'
            SearchPattern: '**/*.pdb'
            SymbolServerType: TeamServices
            IndexSources: false
            SymbolsProduct: V8Jsi
            SymbolsVersion: $(Build.BuildNumber)
            SymbolsArtifactName: V8Jsi-Symbols-$(Build.BuildId)
            DetailedLog: true
            TreatNotIndexedAsWarning: false
