#
# The v8-jsi Release pipeline entry point.
# It releases NuGet packages to the public ms/react-native ADO feed and to the Office feed.
#

name: v8jsi_release_0.0.$(Date:yyMM.d)$(Rev:rrr)

# The triggers are overridden by the ADO pipeline definitions.
trigger: none
pr: none

resources:
  pipelines:
  - pipeline: microsoft.v8-jsi.ci
    project: ISS
    source: microsoft.v8-jsi.ci
    trigger:
      branches:
        include:
        - master
        - main
        - '*-stable'

  repositories:
  - repository: CustomPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/OfficePipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@CustomPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      vmImage: windows-latest
      os: windows

    stages:
    - stage: publish_nugets
      displayName: Publish V8Jsi NuGets

      jobs:
      - job: ms_react_native_nuget_job
        displayName: Publish Nuget to ms/react-native-public
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - template: .ado/templates/publish-nuget-to-ado-feed.yml@self
          parameters:
            endpointId: '29e4c04c-ae69-4453-b9f3-bfef7a4c8d32'
            nugetFeedUrl: 'https://pkgs.dev.azure.com/ms/react-native/_packaging/react-native-public/nuget/v3/index.json'
            packageParentPath: '$(Pipeline.Workspace)/published-packages'
            packagesToPush: '$(Pipeline.Workspace)/published-packages/ReactNative.V8Jsi.Windows.*.nupkg'
            publishFeedCredentials: 'Nuget - ms/react-native-public'
            feedDisplayName: 'ms/react-native-public'

      - job: office_nuget_job
        displayName: Publish Nuget to office
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages
            targetPath: $(Pipeline.Workspace)\published-packages

        steps:
        - template: .ado/templates/publish-nuget-to-office-feed.yml@self
          parameters:
            packageParentPath: $(Pipeline.Workspace)\published-packages
            packagesToPush: $(Pipeline.Workspace)/published-packages/ReactNative.V8Jsi.Windows.*.nupkg

      - job: publish_symbols_job
        displayName: Publish PDB Symbols to Symbol Server
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          # Consume the per-arch Release build artifacts directly (the same signed
          # bits the NuGet aggregator packs) instead of unzipping the .nupkgs to
          # harvest PDBs. Each cell's pkg-staging already carries the signed
          # v8jsi.dll and its PDB, so we build once, sign once, and reuse. Keep
          # each artifact in its own subfolder under a shared symbols/ root.
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: Desktop_x64_Release
            targetPath: $(Pipeline.Workspace)\symbols\Desktop_x64_Release
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: Desktop_x86_Release
            targetPath: $(Pipeline.Workspace)\symbols\Desktop_x86_Release
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: Desktop_ARM64_Release
            targetPath: $(Pipeline.Workspace)\symbols\Desktop_ARM64_Release

        steps:
        - pwsh: |
            $symbolsDir = "$(Pipeline.Workspace)/symbols"
            $pdbs = Get-ChildItem $symbolsDir -Recurse -Filter "*.pdb"
            Write-Host "Found $($pdbs.Count) PDB file(s) under $symbolsDir`:"
            foreach ($pdb in $pdbs) {
              Write-Host "  $($pdb.FullName) ($([math]::Round($pdb.Length / 1MB, 2)) MB)"
            }
            if ($pdbs.Count -eq 0) {
              Write-Host "##vso[task.logissue type=warning]No PDB files found in downloaded artifacts"
            }
          displayName: Inspect downloaded symbols

        - template: .ado/templates/publish-symbols.yml@self
          parameters:
            symbolsArtifactName: V8Jsi-Symbols-$(Build.BuildId)

      # =====================================================================
      # New (Node.js-source) package: Microsoft.JavaScript.V8.
      # Additive siblings of the three jobs above — those keep publishing the
      # legacy ReactNative.V8Jsi.Windows package unchanged. These consume the
      # separate published-packages-new artifact (produced by the
      # V8JsiCreateNugetNew CI aggregator) and push Microsoft.JavaScript.V8.*
      # to the same two feeds, plus its symbols to the Symbol Server. Both
      # packages publish during the consumer migration window.
      # =====================================================================
      - job: ms_react_native_nuget_job_new
        displayName: Publish Nuget (Microsoft.JavaScript.V8) to ms/react-native-public
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages-new
            targetPath: $(Pipeline.Workspace)\published-packages-new

        steps:
        - template: .ado/templates/publish-nuget-to-ado-feed.yml@self
          parameters:
            endpointId: '29e4c04c-ae69-4453-b9f3-bfef7a4c8d32'
            nugetFeedUrl: 'https://pkgs.dev.azure.com/ms/react-native/_packaging/react-native-public/nuget/v3/index.json'
            packageParentPath: '$(Pipeline.Workspace)/published-packages-new'
            packagesToPush: '$(Pipeline.Workspace)/published-packages-new/Microsoft.JavaScript.V8.*.nupkg'
            publishFeedCredentials: 'Nuget - ms/react-native-public'
            feedDisplayName: 'ms/react-native-public'

      - job: office_nuget_job_new
        displayName: Publish Nuget (Microsoft.JavaScript.V8) to office
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: published-packages-new
            targetPath: $(Pipeline.Workspace)\published-packages-new

        steps:
        - template: .ado/templates/publish-nuget-to-office-feed.yml@self
          parameters:
            packageParentPath: $(Pipeline.Workspace)\published-packages-new
            packagesToPush: $(Pipeline.Workspace)/published-packages-new/Microsoft.JavaScript.V8.*.nupkg

      - job: publish_symbols_job_new
        displayName: Publish PDB Symbols (Microsoft.JavaScript.V8) to Symbol Server
        condition: succeeded()
        timeoutInMinutes: 30

        templateContext:
          type: releaseJob
          isProduction: true
          # Consume the per-arch build artifacts directly — the signed v8jsi.dll +
          # PDB from each Release cell, and the signed sandbox binaries + PDBs —
          # the same bits the NuGet aggregator packs. Build once, sign once, reuse;
          # no dependence on a build.ts-staged symbols/ dir. Each artifact lands in
          # its own subfolder under a shared symbols/ root.
          #
          # TEMPORARY: the ARM64 artifacts (Desktop_ARM64_Release-new,
          # sandbox-binaries-win-arm64) are intentionally omitted. Those cells build
          # natively on the ARM64 pool, which has no x64 .NET yet, so they skip SBoM
          # generation (sbomEnabled: false) — and this production release job forces
          # SBoM validation on every consumed artifact, which then fails ("No SBOM
          # found … \_manifest"). Restore both ARM64 inputs once the ARM64 image
          # gains x64 .NET and the ARM64 build cells re-enable SBoM. (ARM64 PDBs
          # still ship inside the NuGet package in the meantime.)
          inputs:
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: Desktop_x64_Release-new
            targetPath: $(Pipeline.Workspace)\symbols\Desktop_x64_Release-new
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: Desktop_x86_Release-new
            targetPath: $(Pipeline.Workspace)\symbols\Desktop_x86_Release-new
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: sandbox-binaries-win-x64
            targetPath: $(Pipeline.Workspace)\symbols\sandbox-binaries-win-x64
          - input: pipelineArtifact
            pipeline: microsoft.v8-jsi.ci
            artifactName: sandbox-binaries-win-x86
            targetPath: $(Pipeline.Workspace)\symbols\sandbox-binaries-win-x86

        steps:
        - pwsh: |
            $symbolsDir = "$(Pipeline.Workspace)/symbols"
            $pdbs = Get-ChildItem $symbolsDir -Recurse -Filter "*.pdb"
            Write-Host "Found $($pdbs.Count) PDB file(s) under $symbolsDir`:"
            foreach ($pdb in $pdbs) {
              Write-Host "  $($pdb.FullName) ($([math]::Round($pdb.Length / 1MB, 2)) MB)"
            }
            if ($pdbs.Count -eq 0) {
              Write-Host "##vso[task.logissue type=warning]No PDB files found in downloaded artifacts"
            }
          displayName: Inspect downloaded symbols

        - template: .ado/templates/publish-symbols.yml@self
          parameters:
            symbolsArtifactName: V8Jsi-Symbols-New-$(Build.BuildId)
