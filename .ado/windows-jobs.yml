parameters:
    # isPublish is `true` for CI builds and `false` for PR validation.
  - name: isPublish
    type: boolean
    default: false
    # To fake building v8-jsi for faster debugging.
  - name: fakeBuild
    type: boolean
    default: false
    # Matrix with target platforms for v8-jsi binaries.
  - name: BuildMatrix
    type: object
    default:
      - Name: Desktop_x64_Debug
        BuildConfiguration: Debug
        BuildPlatform: x64
        AppPlatform: win32
      - Name: Desktop_x86_Debug
        BuildConfiguration: Debug
        BuildPlatform: x86
        AppPlatform: win32
      - Name: Desktop_ARM64_Debug
        BuildConfiguration: Debug
        BuildPlatform: arm64
        AppPlatform: win32
      - Name: Desktop_x64_Release
        BuildConfiguration: Release
        BuildPlatform: x64
        AppPlatform: win32
      - Name: Desktop_x86_Release
        BuildConfiguration: Release
        BuildPlatform: x86
        AppPlatform: win32
      - Name: Desktop_ARM64_Release
        BuildConfiguration: Release
        BuildPlatform: arm64
        AppPlatform: win32
    # Matrix with target platforms for the sandbox binaries. A separate list
    # from BuildMatrix because the sandbox cells carry extra per-arch knobs: the
    # gn out dir (sbox.dll/v8host.exe land in out/sandbox-<cpu>) and whether the
    # lockdown tier runs in this job (RunTier).
    # RunTier is true for every arch: x64/x86 run on the x64 agent (x86 via
    # WOW64) and arm64 runs natively on the ARM64 managed-image pool, so each
    # cell executes its own Untrusted lockdown tier.
  - name: SandboxMatrix
    type: object
    default:
      - Name: x64
        BuildPlatform: x64
        Rid: win-x64
        SboxOutDir: deps/chromium/out/sandbox-x64
        RunTier: true
      - Name: x86
        BuildPlatform: x86
        Rid: win-x86
        SboxOutDir: deps/chromium/out/sandbox-x86
        RunTier: true
      - Name: arm64
        BuildPlatform: arm64
        Rid: win-arm64
        SboxOutDir: deps/chromium/out/sandbox-arm64
        RunTier: true

resources:
  repositories:
    # The repo for the Office compliant build pipeline templates.
  - repository: OfficePipelineTemplates
    type: git
    name: 1ESPipelineTemplates/OfficePipelineTemplates
    ref: refs/tags/release

extends:
  # Extend the Office compliant build pipeline template.
  ${{ if eq(parameters.isPublish, true) }}:
    template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  ${{ else }}:
    template: v1/Office.Unofficial.PipelineTemplate.yml@OfficePipelineTemplates

  parameters:
    # 1ES auto-injects PREfast (/analyze) into every MSBuild C++ compile, but the
    # Node.js >= 24 build uses clang-cl, which rejects /analyze and fails. Only
    # this flag gates the injection (sdl.prefast.enabled does not). CodeQL still
    # covers compiled static analysis.
    featureFlags:
      autoEnablePREfastWithNewRuleset: false
    settings:
      ${{ if eq(parameters.isPublish, false) }}:
        skipBuildTagsForGitHubPullRequests: true
    pool:
      name: fabric-internal-pool-large
    sdl:
      # Also disable the PREfast scan itself -- clang-cl can't run /analyze. (The
      # injection above is the actual build-breaker; this is belt-and-suspenders.)
      prefast:
        enabled: false
        justificationForDisabling: "Build uses clang-cl (required by Node.js >= 24); MSVC PREfast /analyze is incompatible. Compiled static analysis is covered by CodeQL."
      bandit:
        # Chromium's vendored build/test Python uses exec() for Python-formatted
        # metadata and MD5/SHA1 for non-security cache keys and test data. Keep
        # Bandit enabled for first-party and Node/V8 Python.
        excludedPaths: |
          .gdn
          deps\chromium
      binskim:
        analyzeTarget: |
          $(Build.StagingDirectory)\out\pkg-staging\**\*.dll
          $(Build.StagingDirectory)\out\pkg-staging\**\*.exe
      eslint:
        enableExclusions: true
        # This repo does not ship any JavaScript code. But it has many test cases for
        # the Hermes JS engine that fail parsing, have code considered insecure and crash eslint.
        exclusionPatterns: |
          '**/*.*'
      suppression:
        suppressionFile: $(Build.SourcesDirectory)\.ado\guardian\SDL\.gdnsuppress
      codeql:
        compiled:
          enabled: true
        runSourceLanguagesInSourceAnalysis: true

    stages:
    - stage: main
      jobs:
      - ${{ each matrix in parameters.BuildMatrix }}:
        - job: V8JsiBuild_${{ matrix.Name }}
          displayName: Build V8-JSI ${{ matrix.Name }}

          timeoutInMinutes: 1200

          variables:
          - name: Packaging.EnableSBOMSigning
            value: ${{ startsWith(variables['System.CollectionUri'], 'https://dev.azure.com/microsoft') }}

          templateContext:
            outputs:
              # The base template takes care of publishing the artifacts.
            - output: pipelineArtifact
              artifactName: ${{ matrix.Name }}
              targetPath: $(Build.StagingDirectory)\out\pkg-staging

          steps:
          - task: UsePythonVersion@0
            displayName: Use Python 3.x
            inputs:
              versionSpec: '3.x'
              addToPath: true
              architecture: 'x64'

          - template: /.ado/windows-build.yml@self
            parameters:
              outputPath: $(Build.StagingDirectory)\out\pkg-staging
              appPlatform: ${{ matrix.AppPlatform }}
              buildConfiguration: ${{ matrix.BuildConfiguration }}
              buildPlatform: ${{ matrix.BuildPlatform }}
              isPublish: ${{ parameters.isPublish }}
              fakeBuild: ${{ parameters.fakeBuild }}

            # Sign binaries only for the non-fake CI builds.
          - ${{ if and(eq(parameters.isPublish, true), eq(parameters.fakeBuild, false)) }}:
            - task: EsrpCodeSigning@6
              displayName: CodeSign Binaries
              inputs:
                connectedServiceName: 'ESRP-JSHost3'
                appRegistrationClientId: '0a35e01f-eadf-420a-a2bf-def002ba898d'
                appRegistrationTenantId: 'cdc5aeea-15c5-4db6-b079-fcadd2505dc2'
                authAKVName: 'OGX-JSHost-KV'
                authCertName: 'OGX-JSHost-Auth4'
                authSignCertName: 'OGX-JSHost-Sign3'
                folderPath: $(Build.StagingDirectory)\out\pkg-staging
                # Recursively finds files matching these patterns:
                pattern: |
                  **\v8jsi.dll
                useMinimatch: true
                signConfigType: inlineSignParams
                inlineOperation: |
                  [
                    {
                      "KeyCode" : "CP-230012",
                      "OperationCode" : "SigntoolSign",
                      "Parameters" : {
                        "OpusName" : "Microsoft",
                        "OpusInfo" : "http://www.microsoft.com",
                        "FileDigest" : "/fd \"SHA256\"",
                        "PageHash" : "/NPH",
                        "TimeStamp" : "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                      },
                      "ToolName" : "sign",
                      "ToolVersion" : "1.0"
                    },
                    {
                      "KeyCode" : "CP-230012",
                      "OperationCode" : "SigntoolVerify",
                      "Parameters" : {},
                      "ToolName" : "sign",
                      "ToolVersion" : "1.0"
                    }
                  ]

      - ${{ each matrix in parameters.BuildMatrix }}:
        - job: V8JsiBuildNew_${{ matrix.Name }}
          displayName: Build V8-JSI (Node.js source) ${{ matrix.Name }}

          timeoutInMinutes: 1200

          # ARM64 cells build natively on the ARM64 managed-image pool so their
          # tests actually execute -- on an x64 agent build.ts can only cross-
          # compile arm64 and skips the tests. windows-2025-1espt-arm64 is a
          # single-image pool, so it takes no ImageOverride demand. x64/x86 cells
          # inherit the top-level fabric-internal-pool-large pool, unchanged.
          ${{ if eq(matrix.BuildPlatform, 'arm64') }}:
            pool:
              name: windows-2025-1espt-arm64

          variables:
          - name: Packaging.EnableSBOMSigning
            value: ${{ startsWith(variables['System.CollectionUri'], 'https://dev.azure.com/microsoft') }}

          templateContext:
            outputs:
              # Only Release cells stage a NuGet artifact: build.ts --pack lays
              # out-new/pkg-staging for the V8JsiCreateNugetNew aggregator. Debug
              # cells just build + run gtests (no NuGet ships from Debug), so the
              # outputs list is empty for them. Publishing only pkg-staging (not
              # the whole out-new) keeps the per-cell artifact to the binaries +
              # headers the aggregator needs — it omits the unused per-cell .nupkg.
            - ${{ if eq(matrix.BuildConfiguration, 'Release') }}:
              - output: pipelineArtifact
                artifactName: ${{ matrix.Name }}-new
                targetPath: $(Build.StagingDirectory)\out-new\pkg-staging
                # The 1ES SBoM ManifestGenerator runs as an x64 process and can't
                # load the arm64 agent's native .NET (hostfxr arch mismatch,
                # 0x800700C1), and its x64-runtime self-install is blocked by
                # network isolation. This per-cell artifact is intermediate -- the
                # shipped NuGet's SBoM is produced by the V8JsiCreateNugetNew
                # aggregator on x64 -- so skip SBoM here for arm64 only; x64/x86
                # keep generating it.
                ${{ if eq(matrix.BuildPlatform, 'arm64') }}:
                  sbomEnabled: false

          steps:
            # ARM64 agents ship no externals\node10, but the mandatory 1ES build-
            # retention post-job still runs on the Node 10 handler; shim node10 to
            # the image's Node so that post-job doesn't fail. Right after checkout.
          - ${{ if eq(matrix.BuildPlatform, 'arm64') }}:
            - template: /.ado/ensure-node10-shim.yml@self

          - task: UsePythonVersion@0
            displayName: Use Python 3.x
            inputs:
              versionSpec: '3.x'
              addToPath: true
              architecture: 'x64'

          - task: UseNode@1
            displayName: Use Node.js 24.x
            inputs:
              version: '24.x'

            # The Release cells pack (build.ts --pack) and smoke (run-smoke.ps1)
            # both need nuget.exe on PATH.
          - task: NuGetToolInstaller@1
            displayName: Install NuGet tools
            inputs:
              versionSpec: ">=4.6.0"

          - template: /.ado/windows-build-new.yml@self
            parameters:
              outputPath: $(Build.StagingDirectory)\out-new
              appPlatform: ${{ matrix.AppPlatform }}
              buildConfiguration: ${{ matrix.BuildConfiguration }}
              buildPlatform: ${{ matrix.BuildPlatform }}
              isPublish: ${{ parameters.isPublish }}
              fakeBuild: ${{ parameters.fakeBuild }}

        # =====================================================================
        # Sandbox binaries. One job PER RID (x64/x86/arm64) builds that arch's
        # sandbox payload and publishes it (under a build/native/<rid>/ layout)
        # as the `sandbox-binaries-<rid>` artifact, which the V8JsiCreateNugetNew
        # aggregator merges into the Microsoft.JavaScript.V8.<rid> package. The
        # sandbox is kept a separate job + artifact (not folded into the MSVC
        # matrix cells) to isolate the gn/clang toolchain it needs. Each cell runs
        # on its own fresh agent, so the cross-arch out-dir clobber (vcbuild
        # always writes deps/nodejs/out/Release regardless of arch) and the
        # lite-flag stale-snapshot gotcha (toggling the sandbox-engine flags needs
        # a clean engine out dir) do not apply. Each builds TWO toolchains:
        #   * v8jsisb.dll      -- the jitless sandbox engine (MSVC/vcbuild, via
        #                         scripts/build.ts --build-v8jsisb). x64/arm64
        #                         carry the V8 cage; x86 is the degraded no-cage
        #                         variant (the cage is 64-bit-only).
        #   * sbox.dll/v8host.exe -- the Chromium sandbox (gn + VS clang/ninja, via
        #                         scripts/sbox-build.ts --target-cpu). x64/x86
        #                         build on the x64 agent; arm64 builds natively on
        #                         the ARM64 pool. test_app.exe is the TEST harness
        #                         and is NOT shipped/signed.
        # Hygiene gates (export allowlist + Hybrid CRT + BinSkim) run via --check.
        # The Untrusted lockdown tier runs as a CI test for every arch: x64 + x86
        # on the x64 agent (x86 via WOW64) and arm64 natively on the ARM64 pool
        # (RunTier: true). The three shipped binaries are signed on the publishing
        # build.
        # =====================================================================
      - ${{ each sb in parameters.SandboxMatrix }}:
        - job: V8JsiBuildSandbox_${{ sb.Name }}
          displayName: Build Sandbox (${{ sb.Rid }})

          timeoutInMinutes: 180

          # ARM64 builds natively on the ARM64 managed-image pool so its Untrusted
          # lockdown tier can execute (AA64 binaries can't run on an x64 agent).
          # It's a single-image pool, so no ImageOverride demand. x64/x86 keep the
          # existing image, unchanged.
          ${{ if eq(sb.BuildPlatform, 'arm64') }}:
            pool:
              name: windows-2025-1espt-arm64
          ${{ else }}:
            pool:
              name: fabric-internal-pool-large
              demands: ImageOverride -equals windows-2025-1espt

          variables:
          - name: Packaging.EnableSBOMSigning
            value: ${{ startsWith(variables['System.CollectionUri'], 'https://dev.azure.com/microsoft') }}

          templateContext:
            outputs:
            - output: pipelineArtifact
              artifactName: sandbox-binaries-${{ sb.Rid }}
              targetPath: $(Build.StagingDirectory)\sandbox
              # Same arm64 SBoM skip as the V8JsiBuildNew cell: the x64-only 1ES
              # SBoM toolkit can't load the arm64 agent's native .NET (hostfxr arch
              # mismatch, 0x800700C1). This per-RID artifact is intermediate -- the
              # shipped NuGet's SBoM is produced by the V8JsiCreateNugetNew
              # aggregator on x64 -- so skip SBoM here for arm64 only; x64/x86 keep
              # generating it.
              ${{ if eq(sb.BuildPlatform, 'arm64') }}:
                sbomEnabled: false

          steps:
            # The vendored gn (deps/gn/gn.exe) is a Git LFS object; the default
            # checkout skips LFS smudging, so fetch it explicitly or sbox-build.ts
            # can't find gn.
          - checkout: self
            lfs: true

            # ARM64 agents ship no externals\node10, but the mandatory 1ES build-
            # retention post-job still runs on the Node 10 handler; shim node10 to
            # the image's Node so that post-job doesn't fail.
          - ${{ if eq(sb.BuildPlatform, 'arm64') }}:
            - template: /.ado/ensure-node10-shim.yml@self

          - task: UsePythonVersion@0
            displayName: Use Python 3.x
            inputs:
              versionSpec: '3.x'
              addToPath: true
              architecture: 'x64'

          - task: UseNode@1
            displayName: Use Node.js 24.x
            inputs:
              version: '24.x'

          - ${{ if eq(parameters.fakeBuild, false) }}:
              # BinSkim (run by --check) installs from the react-native-public ADO
              # feed; authenticate the NuGet client for that restore.
            - task: NuGetToolInstaller@1
              displayName: Install NuGet tools
              inputs:
                versionSpec: ">=4.6.0"

            - task: NuGetAuthenticate@1
              displayName: Authenticate NuGet (BinSkim feed)

              # gn gen + ninja generic with the VS clang/ninja toolchain. The
              # script resolves the toolchain via vswhere, creates the space-free
              # clang junction, writes args.gn, and builds into the per-arch out
              # dir (out/sandbox-<cpu>).
            - pwsh: |
                node scripts/sbox-build.ts --target-cpu ${{ sb.BuildPlatform }}
              displayName: Build sbox.dll + v8host.exe (gn/ninja, VS clang)
              workingDirectory: $(Build.SourcesDirectory)

              # The jitless sandbox engine (MSVC/vcbuild). Fresh agent => clean
              # engine out, so the lite-flag stale-snapshot gotcha doesn't apply.
            - pwsh: |
                node scripts/build.ts --platform ${{ sb.BuildPlatform }} --configuration release `
                    --build-v8jsisb --no-test
              displayName: Build v8jsisb.dll (jitless sandbox engine, MSVC)
              workingDirectory: $(Build.SourcesDirectory)

              # Hygiene gates: export allowlist + Hybrid CRT + BinSkim, over this
              # arch's out dir (--target-cpu resolves it). Exits non-zero on any
              # unaccepted finding.
            - pwsh: |
                node scripts/sbox-build.ts --no-gen --no-build --check `
                    --target-cpu ${{ sb.BuildPlatform }} `
                    --output-path $(Build.StagingDirectory)\out
              displayName: Sandbox hygiene gates (exports + Hybrid CRT + BinSkim)
              workingDirectory: $(Build.SourcesDirectory)

              # Lockdown tier test (product-default Untrusted = jitless + ACG):
              # stage the engine next to v8host (it LoadLibrary's v8jsisb.dll by
              # name) and run the test_app broker harness. RESULT: PASS +
              # target exit=0 is the success signal. Runs for every arch: x64 + x86
              # on the x64 agent (x86 via WOW64) and arm64 natively on the ARM64
              # pool.
            - ${{ if eq(sb.RunTier, true) }}:
              - pwsh: |
                  $sandboxOut = "$(Build.SourcesDirectory)\${{ sb.SboxOutDir }}"
                  Copy-Item "$(Build.SourcesDirectory)\deps\nodejs\out\Release\v8jsisb.dll" $sandboxOut -Force
                  $env:DEPOT_TOOLS_WIN_TOOLCHAIN = '0'
                  $env:SBOX_ALLOW_UNSIGNED = '1'
                  & "$sandboxOut\test_app.exe"
                  if ($LASTEXITCODE -ne 0) { Write-Error "Untrusted tier FAILED (exit $LASTEXITCODE)" }
                displayName: Lockdown tier test (Untrusted)
                workingDirectory: $(Build.SourcesDirectory)

            # Stage the shipped sandbox binaries under a build/native/<rid>/
            # layout so the aggregator can merge the downloaded artifact straight
            # into pkg-staging. v8jsisb.pdb is renamed to v8jsisb.dll.pdb (the
            # nuspec/symbol globs expect <dll>.pdb). test_app.exe (test harness)
            # is deliberately excluded. Always runs so the artifact path exists.
          - pwsh: |
              $sandboxOut = "$(Build.SourcesDirectory)\${{ sb.SboxOutDir }}"
              $eng = "$(Build.SourcesDirectory)\deps\nodejs\out\Release"
              $dst = "$(Build.StagingDirectory)\sandbox\build\native\${{ sb.Rid }}"
              New-Item -ItemType Directory -Force -Path $dst | Out-Null
              foreach ($f in 'sbox.dll','sbox.dll.lib','sbox.dll.pdb','v8host.exe','v8host.exe.pdb') {
                $p = Join-Path $sandboxOut $f
                if (Test-Path $p) { Copy-Item $p $dst }
              }
              if (Test-Path "$eng\v8jsisb.dll") { Copy-Item "$eng\v8jsisb.dll" $dst }
              if (Test-Path "$eng\v8jsisb.dll.pdb") { Copy-Item "$eng\v8jsisb.dll.pdb" $dst }
              elseif (Test-Path "$eng\v8jsisb.pdb") { Copy-Item "$eng\v8jsisb.pdb" (Join-Path $dst 'v8jsisb.dll.pdb') }
              # mkv8snapshot.exe: the offline snapshot builder (vcbuild output,
              # same dir as the engine — it links no V8). Ships per-RID beside
              # the engine it LoadLibrary's. PDB renamed to <exe>.pdb for the glob.
              if (Test-Path "$eng\mkv8snapshot.exe") { Copy-Item "$eng\mkv8snapshot.exe" $dst }
              if (Test-Path "$eng\mkv8snapshot.exe.pdb") { Copy-Item "$eng\mkv8snapshot.exe.pdb" $dst }
              elseif (Test-Path "$eng\mkv8snapshot.pdb") { Copy-Item "$eng\mkv8snapshot.pdb" (Join-Path $dst 'mkv8snapshot.exe.pdb') }
            displayName: Stage sandbox binaries (build/native/${{ sb.Rid }})
            workingDirectory: $(Build.SourcesDirectory)

              # Sign the SHIPPED sandbox binaries (v8jsisb.dll, sbox.dll,
              # v8host.exe, mkv8snapshot.exe) only on the publishing CI build.
              # test_app.exe is never staged, so it is never signed.
          - ${{ if and(eq(parameters.isPublish, true), eq(parameters.fakeBuild, false)) }}:
            - task: EsrpCodeSigning@6
              displayName: CodeSign Sandbox Binaries
              inputs:
                connectedServiceName: 'ESRP-JSHost3'
                appRegistrationClientId: '0a35e01f-eadf-420a-a2bf-def002ba898d'
                appRegistrationTenantId: 'cdc5aeea-15c5-4db6-b079-fcadd2505dc2'
                authAKVName: 'OGX-JSHost-KV'
                authCertName: 'OGX-JSHost-Auth4'
                authSignCertName: 'OGX-JSHost-Sign3'
                folderPath: $(Build.StagingDirectory)\sandbox
                # Recursively finds files matching these patterns:
                pattern: |
                  **\v8jsisb.dll
                  **\sbox.dll
                  **\v8host.exe
                  **\mkv8snapshot.exe
                useMinimatch: true
                signConfigType: inlineSignParams
                inlineOperation: |
                  [
                    {
                      "KeyCode" : "CP-230012",
                      "OperationCode" : "SigntoolSign",
                      "Parameters" : {
                        "OpusName" : "Microsoft",
                        "OpusInfo" : "http://www.microsoft.com",
                        "FileDigest" : "/fd \"SHA256\"",
                        "PageHash" : "/NPH",
                        "TimeStamp" : "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                      },
                      "ToolName" : "sign",
                      "ToolVersion" : "1.0"
                    },
                    {
                      "KeyCode" : "CP-230012",
                      "OperationCode" : "SigntoolVerify",
                      "Parameters" : {},
                      "ToolName" : "sign",
                      "ToolVersion" : "1.0"
                    }
                  ]

      - job: V8JsiCreateNuget
        dependsOn:
        - ${{ each matrix in parameters.BuildMatrix }}:
          - V8JsiBuild_${{ matrix.Name }}
        displayName: Create Nuget

        templateContext:
          outputs:
            # The base template takes care of publishing the artifacts.
          - output: pipelineArtifact
            targetPath: $(Build.StagingDirectory)\out\pkg
            artifactName: published-packages

        steps:
          # Packing itself only needs the downloaded artifacts, but the 1ES SDL
          # auto-baselining pre-check needs the repo (.git + guardian_baselines.
          # gdnbaselines) on disk. With `checkout: none` it can't find them and
          # warns "repo is not checked out". Check out source so the pre-check
          # behaves like the V8JsiCreateNugetNew job below.
        - checkout: self

          # The substitution tags in the nuspec require that we use at least NuGet 4.6.
        - task: NuGetToolInstaller@1
          displayName: Install NuGet tools
          inputs:
            versionSpec: ">=4.6.0"

          # Download v8-jsi binaries built in previous jobs.
        - ${{ each matrix in parameters.BuildMatrix }}:
          - task: DownloadPipelineArtifact@2
            displayName: Download ${{ matrix.Name }} v8-jsi artifacts
            inputs:
              artifact: ${{ matrix.Name }}
              path: $(Build.StagingDirectory)\out\pkg-staging

        - task: PowerShell@2
          displayName: Set version variables
          inputs:
            targetType: 'inline'
            script: |
              $config = Get-Content $(Build.StagingDirectory)\out\pkg-staging\config.json | ConvertFrom-Json
              $Version = $config.version
              Write-Host "##vso[task.setvariable variable=Version]$Version"
              Write-Host "##vso[task.setvariable variable=VersionDetails]V8 version: $Version; Git revision: $(Build.SourceVersion)"

        - task: NuGetCommand@2
          displayName: 'NuGet Pack'
          inputs:
            command: pack
            packagesToPack: $(Build.StagingDirectory)\out\pkg-staging\ReactNative.V8Jsi.Windows.nuspec
            packDestination: $(Build.StagingDirectory)\out\pkg
            buildProperties: CommitId=$(Build.SourceVersion);nugetroot=$(Build.StagingDirectory)\out\pkg-staging;RepoUri=$(Build.Repository.Uri);VersionDetails=$(VersionDetails)
            versioningScheme: byEnvVar
            versionEnvVar: Version
            includeSymbols: false

        - pwsh: |
            if ((Get-ChildItem $(Build.StagingDirectory)\out\pkg\*nupkg).Count -lt 1) {
              Write-Error 'No NUPKG generated'
            }
          displayName: Verify NuGet packages creation

          # Sign the NuGet packages only for the CI builds.
        - ${{ if parameters.isPublish }}:
          - task: EsrpCodeSigning@6
            displayName: CodeSign NuGets
            inputs:
              connectedServiceName: 'ESRP-JSHost3'
              appRegistrationClientId: '0a35e01f-eadf-420a-a2bf-def002ba898d'
              appRegistrationTenantId: 'cdc5aeea-15c5-4db6-b079-fcadd2505dc2'
              authAKVName: 'OGX-JSHost-KV'
              authCertName: 'OGX-JSHost-Auth4'
              authSignCertName: 'OGX-JSHost-Sign3'
              folderPath: $(Build.StagingDirectory)\out\pkg
              pattern: |
                ReactNative.V8Jsi.Windows.*.nupkg
              useMinimatch: true
              signConfigType: inlineSignParams
              inlineOperation: |
                [
                  {
                    "KeyCode" : "CP-401405",
                    "OperationCode" : "NuGetSign",
                    "Parameters" : {},
                    "ToolName" : "sign",
                    "ToolVersion" : "1.0"
                  },
                  {
                    "KeyCode" : "CP-401405",
                    "OperationCode" : "NuGetVerify",
                    "Parameters" : {},
                    "ToolName" : "sign",
                    "ToolVersion" : "1.0"
                  }
                ]

        # =====================================================================
        # New (Node.js-source) NuGet aggregator: Microsoft.JavaScript.V8.
        # Additive sibling of V8JsiCreateNuget above — that job keeps packing
        # the legacy ReactNative.V8Jsi.Windows package unchanged. This one
        # collects the per-RID pkg-staging that each Release V8JsiBuildNew_*
        # cell uploaded and runs scripts/build.ts --pack to emit the 4-pack
        # (3 per-RID Microsoft.JavaScript.V8.<rid>.nupkg + 1 meta
        # Microsoft.JavaScript.V8.nupkg). It publishes a separate
        # published-packages-new artifact so the release pipeline can push the
        # new package alongside the old one during the migration window.
        # =====================================================================
      - job: V8JsiCreateNugetNew
        dependsOn:
        - ${{ each matrix in parameters.BuildMatrix }}:
          - ${{ if eq(matrix.BuildConfiguration, 'Release') }}:
            - V8JsiBuildNew_${{ matrix.Name }}
          # Merge the sandbox binaries (all three RIDs) into the per-RID
          # packages.
        - ${{ each sb in parameters.SandboxMatrix }}:
          - V8JsiBuildSandbox_${{ sb.Name }}
        displayName: Create Nuget (Node.js source)

        templateContext:
          outputs:
          - output: pipelineArtifact
            targetPath: $(Build.StagingDirectory)\out\pkg
            artifactName: published-packages-new

        steps:
          # Aggregator needs source: scripts/build.ts:packNuGet stages shared
          # headers + consumer source TUs from src/, and runs the 4-pack flow
          # (3 per-RID + 1 meta) for Microsoft.JavaScript.V8.
        - checkout: self

        - task: UseNode@1
          displayName: Use Node.js 24.x
          inputs:
            version: '24.x'

        - task: NuGetToolInstaller@1
          displayName: Install NuGet tools
          inputs:
            versionSpec: ">=4.6.0"

          # Download each Release cell's pkg-staging (build/native/<rid>/ with
          # v8jsi.dll + import lib + PDB, plus the shared headers/TUs). Each
          # artifact is the cell's pkg-staging content, so it lands directly
          # under out/pkg-staging; merging all three gives packNuGet a complete
          # per-RID staging so the meta package's <dependencies> resolve.
        - ${{ each matrix in parameters.BuildMatrix }}:
          - ${{ if eq(matrix.BuildConfiguration, 'Release') }}:
            - task: DownloadPipelineArtifact@2
              displayName: Download ${{ matrix.Name }}-new pkg-staging
              inputs:
                artifact: ${{ matrix.Name }}-new
                path: $(Build.StagingDirectory)\out\pkg-staging

          # Merge the sandbox binaries (build/native/<rid>/ layout) into the
          # same pkg-staging so the per-RID nuspec globs pick them up. The
          # packNuGet per-platform loop hits its pre-staged-v8jsi.dll fast path
          # for these RIDs and does not re-stage, so the sandbox binaries must
          # already be in build/native/<rid>/ -- which these downloads provide.
          # Each artifact carries a distinct build/native/<rid>/ subtree, so
          # downloading all three into the same pkg-staging merges cleanly. The
          # per-RID nuspec globs tolerate a RID lacking sandbox binaries, so a
          # partial roll-out still packs.
        - ${{ each sb in parameters.SandboxMatrix }}:
          - task: DownloadPipelineArtifact@2
            displayName: Download sandbox-binaries-${{ sb.Rid }}
            inputs:
              artifact: sandbox-binaries-${{ sb.Rid }}
              path: $(Build.StagingDirectory)\out\pkg-staging

          # Pack: 3 per-RID Microsoft.JavaScript.V8.<rid>.nupkg + meta
          # Microsoft.JavaScript.V8.nupkg, plus the per-RID PDBs staged under
          # pkg/symbols/<rid>/ for the release pipeline's symbol publish. No
          # local build needed — packNuGet's pre-staged binary fallback reuses
          # the matrix-uploaded build/native/<rid>/ content. A successful pack
          # with all three platforms guarantees the 4-pack, so there is no
          # separate verify step.
        - pwsh: |
            node scripts/build.ts --no-build --no-test --pack `
                --platform x86 --platform x64 --platform arm64 `
                --output-path $(Build.StagingDirectory)\out
          displayName: NuGet Pack (3 per-RID + meta + symbols)
          workingDirectory: $(Build.SourcesDirectory)

          # Sign the NuGet packages only for the CI builds.
        - ${{ if parameters.isPublish }}:
          - task: EsrpCodeSigning@6
            displayName: CodeSign NuGets
            inputs:
              connectedServiceName: 'ESRP-JSHost3'
              appRegistrationClientId: '0a35e01f-eadf-420a-a2bf-def002ba898d'
              appRegistrationTenantId: 'cdc5aeea-15c5-4db6-b079-fcadd2505dc2'
              authAKVName: 'OGX-JSHost-KV'
              authCertName: 'OGX-JSHost-Auth4'
              authSignCertName: 'OGX-JSHost-Sign3'
              folderPath: $(Build.StagingDirectory)\out\pkg
              pattern: |
                Microsoft.JavaScript.V8.*.nupkg
              useMinimatch: true
              signConfigType: inlineSignParams
              inlineOperation: |
                [
                  {
                    "KeyCode" : "CP-401405",
                    "OperationCode" : "NuGetSign",
                    "Parameters" : {},
                    "ToolName" : "sign",
                    "ToolVersion" : "1.0"
                  },
                  {
                    "KeyCode" : "CP-401405",
                    "OperationCode" : "NuGetVerify",
                    "Parameters" : {},
                    "ToolName" : "sign",
                    "ToolVersion" : "1.0"
                  }
                ]
